name: Build and Sign APK (reusable)

on:
  workflow_call:
    inputs:
      tag:
        description: 'Upstream tag to build'
        required: true
        type: string
      upstream_repo:
        description: 'Upstream repository (owner/repo)'
        required: true
        type: string
    secrets:
      SIGNING_KEYSTORE_B64:
        required: true
      SIGNING_PASSWORD:
        required: true
      SIGNING_KEY_ALIAS:
        required: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout upstream source
        uses: actions/checkout@v5
        with:
          repository: ${{ inputs.upstream_repo }}
          ref: ${{ inputs.tag }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            VERSION=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties | grep -oP '[\d]+\.[\d]+\.?[\d]*(?=-)')
            CHECKSUM=$(grep distributionSha256Sum gradle/wrapper/gradle-wrapper.properties | cut -d= -f2)
            gradle wrapper --gradle-version "$VERSION" --gradle-distribution-sha256-sum "$CHECKSUM"
          fi

      - name: Build unsigned release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        id: sign
        env:
          SIGNING_KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_B64 }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        run: |
          echo "$SIGNING_KEYSTORE_B64" | base64 --decode > /tmp/release.jks

          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name "apksigner" | sort -V | tail -1)

          APK=app/build/outputs/apk/release/app-release-unsigned.apk
          APK_NAME="${{ github.event.repository.name }}-signed.apk"

          "$APKSIGNER" sign \
            --ks /tmp/release.jks \
            --ks-pass "pass:$SIGNING_PASSWORD" \
            --ks-key-alias "$SIGNING_KEY_ALIAS" \
            --key-pass "pass:$SIGNING_PASSWORD" \
            "$APK"

          rm /tmp/release.jks
          mv "$APK" "$APK_NAME"
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Create tag in fork
        run: |
          BRANCH=$(gh api repos/${{ github.repository }} --jq '.default_branch')
          HEAD_SHA=$(gh api repos/${{ github.repository }}/git/refs/heads/$BRANCH --jq '.object.sha')
          gh api repos/${{ github.repository }}/git/refs \
            --method POST \
            --field ref="refs/tags/${{ inputs.tag }}" \
            --field sha="$HEAD_SHA" \
            2>/dev/null || echo "Tag already exists, skipping"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          body: "Auto-built and signed from upstream tag ${{ inputs.tag }}"
          files: ${{ steps.sign.outputs.apk_name }}
          make_latest: true
