name: Sync from upstream (reusable)

on:
  workflow_call:

jobs:
  sync:
    runs-on: ubuntu-24.04

    steps:
      - name: Get upstream info from GitHub API
        id: upstream
        run: |
          UPSTREAM_REPO=$(gh api repos/${{ github.repository }} --jq '.parent.full_name')
          UPSTREAM_BRANCH=$(gh api repos/${{ github.repository }} --jq '.parent.default_branch')
          echo "repo=$UPSTREAM_REPO" >> $GITHUB_OUTPUT
          echo "branch=$UPSTREAM_BRANCH" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest upstream tag
        id: upstream_tag
        run: |
          LATEST_TAG=$(gh api repos/${{ steps.upstream.outputs.repo }}/tags --jq '.[0].name')
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest fork release
        id: fork_release
        run: |
          LATEST_RELEASE=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
          echo "tag=$LATEST_RELEASE" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger build if new tag
        if: steps.upstream_tag.outputs.tag != steps.fork_release.outputs.tag
        run: |
          gh workflow run build.yml \
            --repo ${{ github.repository }} \
            --ref ${{ steps.upstream.outputs.branch }} \
            --raw-field tag=${{ steps.upstream_tag.outputs.tag }} \
            --raw-field upstream_repo=${{ steps.upstream.outputs.repo }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
